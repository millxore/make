<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — NovaTrade</title>
<meta name="description" content="Sign in to your Nova Finance account." />
</head>
<body>
 <!-- 1. The compact list widget -->
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
  {
  "colorTheme": "dark",
  "dateRange": "1D",
  "showChart": false,
  "locale": "en",
  "width": "100%",
  "height": "400",
  "largeChartUrl": "",
  "isTransparent": false,
  "showSymbolLogo": true,
  "plotLineColorGrowing": "rgba(41, 98, 255, 1)",
  "plotLineColorFalling": "rgba(255, 0, 0, 1)",
  "gridLineColor": "rgba(240, 243, 250, 0)",
  "scaleFontColor": "rgba(120, 123, 134, 1)",
  "belowLineFillColorGrowing": "rgba(41, 98, 255, 0.12)",
  "belowLineFillColorFalling": "rgba(255, 0, 0, 0.12)",
  "symbolActiveColor": "rgba(41, 98, 255, 0.12)",
  "tabs": [
    {
      "title": "Markets",
      "symbols": [
        {"s": "OANDA:XAUUSD", "d": "Gold"},
        {"s": "OANDA:EURUSD", "d": "Euro / US Dollar"},
        {"s": "BINANCE:BTCUSDT", "d": "Bitcoin"}
      ]
    }
  ]
}
  </script>
</div>

<!-- 2. Hidden modal that will hold the big chart -->
<div id="tv-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999;">
  <div style="position:relative; width:90%; height:90%; margin:2% auto; background:#131722;">
    <button onclick="closeChart()" style="position:absolute; top:10px; right:15px; z-index:10000; background:#fff; border:none; padding:8px 12px; cursor:pointer;">✕ Close</button>
    <div id="tv-chart-container" style="width:100%; height:100%;"></div>
  </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
function openChart(symbol) {
  document.getElementById('tv-modal').style.display = 'block';
  document.getElementById('tv-chart-container').innerHTML = ''; // Clear old chart
  
  new TradingView.widget({
    "container_id": "tv-chart-container",
    "autosize": true,
    "symbol": symbol,
    "interval": "60",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "enable_publishing": false,
    "hide_side_toolbar": false,
    "allow_symbol_change": true
  });
}

function closeChart() {
  document.getElementById('tv-modal').style.display = 'none';
  document.getElementById('tv-chart-container').innerHTML = '';
}

// Attach click listeners to the market overview rows
// TradingView adds rows with class .tv-widget-market-overview__item
document.addEventListener('DOMContentLoaded', function() {
  // Wait a bit for TradingView to render, then bind clicks
  setTimeout(() => {
    document.querySelectorAll('.tv-widget-market-overview__item').forEach(item => {
      item.style.cursor = 'pointer';
      item.addEventListener('click', function() {
        // Symbol is stored in data-symbol attribute
        const symbol = this.getAttribute('data-symbol');
        if(symbol) openChart(symbol);
      });
    });
  }, 2000);
});
</script>
</body>
</html>
