<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — NovaTrade</title>
<meta name="description" content="Sign in to your Nova Finance account." />
</head>
<body>
<!-- TradingView widget for XAUUSD + EURUSD + BTCUSD - Dark Mode -->
<div style="height: 500px; overflow-y: auto; border: 1px solid #2a2e39;">
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
    {
    "colorTheme": "dark",
    "symbols": [
      ["XAUUSD","OANDA:XAUUSD|1D"],
      ["EURUSD","OANDA:EURUSD|1D"],
      ["BTCUSD","BINANCE:BTCUSDT|1D"]
    ],
    "chartOnly": false,
    "width": "100%",
    "height": "1000",
    "locale": "en",
    "isTransparent": false,
    "showChart": true
    }
    </script>
  </div>
</div>
</body>
</html>
