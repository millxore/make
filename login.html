<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
<title>Login — NovaTrade</title>
<meta name="description" content="Sign in to your Nova Finance account." />
<style>
  :root {
    --bg: #050608;
    --panel: #0b0d12;
    --panel-2: #0f1218;
    --text: #ffffff;
    --muted: #8b92a3;
    --amber: oklch(0.85 0.22 145);
    --amber-2: #ffb938;
    --border: 0 0 40px -10px var(--amber);
    --amber-deep: oklch(0.92 0.20 145);
    --gradient-amber: linear-gradient(135deg, var(--amber), var(--amber-deep));
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  .shell {
    display: grid;
    grid-template-columns: 1fr;
    min-height: 100vh;
  }
  @media (min-width: 1024px) {
    .shell { grid-template-columns: 1fr 1fr; }
  }
  /* Toast */
  .toasts{position:fixed;top:1rem;right:1rem;display:flex;flex-direction:column;gap:.5rem;z-index:9999}
  .toast{background:#0e1117;border:1px solid var(--border);color:#fff;padding:.75rem 1rem;border-radius:.5rem;box-shadow:0 10px 30px rgba(0,0,0,.5);font-size:.9rem;min-width:14rem;animation:slide .2s ease-out}
  .toast.success{border-color:rgba(4,140,1,.5)}
  .toast.error{border-color:rgba(220,38,38,.6)}
  @keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  
  /* LEFT */
  .hero {
    position: relative;
    overflow: hidden;
    background: radial-gradient(80% 60% at 30% 50%, rgba(4,140,1,0.18), transparent 60%), #07080b;
    display: flex; align-items: center; justify-content: center;
    padding: 4rem 2rem;
  }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,0.6), transparent 60%),
      radial-gradient(1px 1px at 78% 18%, rgba(255,255,255,0.5), transparent 60%),
      radial-gradient(1px 1px at 38% 80%, rgba(255,255,255,0.5), transparent 60%),
      radial-gradient(1px 1px at 65% 65%, rgba(255,255,255,0.4), transparent 60%),
      radial-gradient(1.5px 1.5px at 88% 88%, rgba(255,255,255,0.5), transparent 60%),
      radial-gradient(1px 1px at 22% 60%, rgba(255,255,255,0.5), transparent 60%);
    pointer-events: none;
  }
  .hero svg.threads {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0.5;
    pointer-events: none;
  }
  .hero-content {
    position: relative; z-index: 1;
    max-width: 28rem; text-align: center;
  }
  .logo-tile {
    width: 64px; height: 64px;
    margin: 0 auto 2rem;
    border-radius: 14px;
    background: var(--gradient-amber);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 32px; color: #0a0a0a;
    box-shadow: 0 10px 40px -10px var(--amber);
  }
  .hero h1 {
    font-size: 3rem;
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 1.25rem;
  }
  .hero h1 .amber {
    display: block;
    background: var(--gradient-amber);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .hero p { color: var(--muted); font-size: 1rem; line-height: 1.6; margin: 0; }

  /* RIGHT */
  .form-wrap {
    position: relative;
    background: #0a0b0f;
    display: flex; align-items: center; justify-content: center;
    padding: 4rem 2rem;
  }
  .topbar {
    position: absolute; top: 1.5rem; left: 1.5rem;
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-weight: 700; font-size: 0.875rem; letter-spacing: 0.04em;
  }
  .topbar .tile {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--gradient-amber);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #0a0a0a; font-size: 16px;
  }
  .card { width: 100%; max-width: 26rem; }
  .card h2 {
    font-size: 1.875rem; font-weight: 700; margin: 0 0 0.5rem;
  }
  .card .sub { color: var(--muted); margin: 0 0 2rem; font-size: 0.95rem; }

  form { display: flex; flex-direction: column; gap: 1.25rem; }
  .field label.lbl {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #c6cad6;
    margin-bottom: 0.5rem;
  }
  .lbl-row { display: flex; justify-content: space-between; align-items: baseline; }
  .lbl-row a {
    font-size: 0.8rem; color: var(--amber); font-weight: 500;
    text-transform: none; letter-spacing: 0;
  }
  .lbl-row a:hover { text-decoration: underline; }
  .field input {
    width: 100%;
    height: 3rem;
    padding: 0 1rem;
    border-radius: 0.625rem;
    border: 1px solid var(--border);
    background: #0e1117;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input::placeholder { color: #4a5060; }
  .field input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
  }

  .submit {
    margin-top: 0.5rem;
    height: 3.25rem;
    width: 100%;
    border: none;
    border-radius: 0.625rem;
    background: var(--amber);
    color: #0a0a0a;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    box-shadow: 0 10px 30px -10px oklch(0.92 0.22 145);
    transition: transform .15s, opacity .15s, box-shadow .15s;
  }
  .submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 14px 36px -10px oklch(0.85 0.22 145); }
  .submit:disabled { opacity: 0.7; cursor: not-allowed; }

  .footer-line {
    margin-top: 1.5rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .footer-line a { color: var(--amber); font-weight: 600; }
  .footer-line a:hover { text-decoration: underline; }

  @media (max-width: 1023px) {
    .hero { padding: 3rem 1.5rem; }
    .hero h1 { font-size: 2.25rem; }
  }
</style>
</head>
<body>
  <div class="shell">
    <!-- LEFT: brand / hero -->
    <section class="hero">
      <svg class="threads" viewBox="0 0 800 800" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="thread" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#27ba0d" stop-opacity="0.0"/>
            <stop offset="50%" stop-color="#27ba0d" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#27ba0d" stop-opacity="0.0"/>
          </linearGradient>
        </defs>
        <g stroke="url(#thread)" stroke-width="0.6" fill="none">
          <path d="M -50 220 C 200 180, 400 320, 850 240" />
          <path d="M -50 320 C 220 280, 420 420, 850 340" />
          <path d="M -50 420 C 180 380, 460 520, 850 440" />
          <path d="M -50 520 C 240 480, 440 620, 850 540" />
          <path d="M -50 620 C 200 580, 460 720, 850 640" />
          <path d="M -50 160 C 260 120, 380 260, 850 180" />
        </g>
      </svg>
      <div class="hero-content">
        <div class="logo-tile">N</div>
        <h1>AUTOMATED CRYPTO<span class="amber">TRADING BOT</span></h1>
        <p>AI-powered crypto trading bot with 24/7 automated execution, advanced risk management, and proven strategies.</p>
      </div>
    </section>

    <div class="toasts" id="toasts"></div>

    <!-- RIGHT: form -->
    <section class="form-wrap">
      <a href="/" class="topbar">
        <span class="tile">N</span>
        <span>NOVATRADE</span>
      </a>

      <div class="card">
        <h2>Welcome Back</h2>
        <p class="sub">Enter your credentials to access your dashboard.</p>

        <form id="loginForm" novalidate>
          <div class="field">
            <label class="lbl" for="email">Email Address</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>

          <div class="field">
            <div class="lbl-row">
              <label class="lbl" for="password">Password</label>
              <a href="#">Forgot password?</a>
            </div>
			<div class="password" style="margin: 0; position: relative;">
	          <input id="password" name="password" class="nova-input flex-1" type="password" placeholder="••••••••" required/>
	          <button type="button" id="togglePassword" style="text-align: right; position: absolute; top: 50%;	right: 3%;	font-size: 16px; background: none; border: none; transform: translateY(-50%); padding: 7px 20px;"><i style="color: #fff;" class="fas fa-eye"></i></button>						
			</div>		
          </div>

          <button type="submit" class="submit" id="submitBtn">
            <span id="submitLabel">Sign In</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </form>

        <p class="footer-line">Don't have an account? <a href="signup.html">Create Account</a></p>
      </div>
    </section>
  </div>

<script>
  // GET SavedInfo
  const savedInfo = JSON.parse(localStorage.getItem('savedInfos'));
  const userEmail = savedInfo.email;
  const userPassword = savedInfo.password;
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const togglePassword = document.getElementById('togglePassword');

  /* ---------- Toast ---------- */
  function toast(msg, kind="success"){
    const el = document.createElement("div");
    el.className = "toast " + kind;
    el.textContent = msg;
    document.getElementById('toasts').appendChild(el);
    setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; }, 3200);
    setTimeout(()=> el.remove(), 3600);
  }
	
  // Toggle password (Hide/Show)
  togglePassword.addEventListener('click', function () {
	const icon = togglePassword.querySelector('i');
	
	const type = passwordInput.type === 'password' ? 'text' : 'password';
	passwordInput.type = type;
	
	icon.classList.toggle('fa-eye');
	icon.classList.toggle('fa-eye-slash');
  });
	
  (function () {
    var form = document.getElementById('loginForm');
    var btn = document.getElementById('submitBtn');
    var label = document.getElementById('submitLabel');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
		
      if (email !== userEmail) {    
         toast("email not registered");
         return;
		}  
		
      if (password !== userPassword) {    
         toast("Incorrect Password!");
         return;
	    } 
      
      btn.disabled = true;
      var original = label.textContent;
      label.textContent = 'Signing in…';
      
      setTimeout(function () {
        btn.disabled = false;
        label.textContent = original;
        window.location.href = 'dashboard.html';
      }, 3000);
    });
  })();
</script>
</body>
</html>
